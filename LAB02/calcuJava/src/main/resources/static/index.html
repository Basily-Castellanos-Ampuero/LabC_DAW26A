<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 480px;">
    <div class="card shadow-sm">
        <div class="card-header text-center">
            <h4 class="mb-0">Calculadora</h4>
        </div>
        <div class="card-body">

            <div class="row g-3 mb-3">
                <div class="col">
                    <label class="form-label">Número A</label>
                    <input type="number" id="numA" class="form-control" value="0">
                </div>
                <div class="col">
                    <label class="form-label">Número B</label>
                    <input type="number" id="numB" class="form-control" value="0">
                </div>
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-primary" onclick="calculate('add')">Suma (A + B)</button>
                <button class="btn btn-secondary" onclick="calculate('sub')">Resta (A - B)</button>
                <button class="btn btn-success" onclick="calculate('mul')">Multiplicación (A × B)</button>
                <button class="btn btn-warning" onclick="calculate('div')">División (A ÷ B)</button>
                <button class="btn btn-info" onclick="calculate('mod')">Módulo (A % B)</button>
            </div>

            <div id="result-box" class="mt-4 d-none">
                <hr>
                <h5 class="text-center">Resultado</h5>
                <div id="result" class="alert text-center fs-4 mb-0"></div>
            </div>

        </div>
    </div>
</div>

<script>
    async function calculate(op) {
        const a = document.getElementById('numA').value;
        const b = document.getElementById('numB').value;
        const resultBox = document.getElementById('result-box');
        const resultEl = document.getElementById('result');

        try {
            const res = await fetch(`/api/${op}?a=${a}&b=${b}`);
            const data = await res.json();

            resultBox.classList.remove('d-none');

            if (data.error) {
                resultEl.className = 'alert alert-danger text-center fs-4 mb-0';
                resultEl.textContent = '⚠ ' + data.error;
            } else {
                resultEl.className = 'alert alert-success text-center fs-4 mb-0';
                resultEl.textContent = data.result;
            }
        } catch (e) {
            resultBox.classList.remove('d-none');
            resultEl.className = 'alert alert-danger text-center fs-4 mb-0';
            resultEl.textContent = 'Error al conectar con el servidor.';
        }
    }
</script>

</body>
</html>
