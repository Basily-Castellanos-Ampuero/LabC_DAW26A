<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Notas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        nav a { margin-right: 15px; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
        .btn { display: inline-block; padding: 6px 12px; background: #0066cc; color: white; text-decoration: none; border-radius: 4px; }
        form p label { display: inline-block; width: 160px; }
        input, select { padding: 4px; }
        button[type=submit] { padding: 6px 14px; background: #0066cc; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'lista_alumnos' %}">Alumnos</a>
        <a href="{% url 'lista_cursos' %}">Cursos</a>
        <a href="{% url 'lista_notas' %}">Notas</a>
    </nav>
    <hr>
    {% block contenido %}{% endblock %}
</body>
</html>
