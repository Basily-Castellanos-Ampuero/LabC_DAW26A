{% extends 'notas/base.html' %}
{% block contenido %}
<h1>Alumnos</h1>
<a class="btn" href="{% url 'crear_alumno' %}">+ Nuevo Alumno</a>
<table>
    <tr><th>Código</th><th>Nombre</th><th>Apellido</th><th>Email</th></tr>
    {% for alumno in alumnos %}
    <tr>
        <td>{{ alumno.codigo }}</td>
        <td>{{ alumno.nombre }}</td>
        <td>{{ alumno.apellido }}</td>
        <td>{{ alumno.email }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No hay alumnos registrados.</td></tr>
    {% endfor %}
</table>
{% endblock %}
