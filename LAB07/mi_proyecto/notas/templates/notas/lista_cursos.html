{% extends 'notas/base.html' %}
{% block contenido %}
<h1>Cursos</h1>
<a class="btn" href="{% url 'crear_curso' %}">+ Nuevo Curso</a>
<table>
    <tr><th>Código</th><th>Nombre</th><th>Créditos</th></tr>
    {% for curso in cursos %}
    <tr>
        <td>{{ curso.codigo }}</td>
        <td>{{ curso.nombre }}</td>
        <td>{{ curso.creditos }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No hay cursos registrados.</td></tr>
    {% endfor %}
</table>
{% endblock %}
