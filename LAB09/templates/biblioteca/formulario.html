{% extends 'base.html' %}
{% block content %}
<h2>{{ titulo }}</h2>

<div class="card">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div>
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <p style="color:red; font-size:0.85rem;">{{ field.errors.as_text }}</p>
                {% endif %}
                {% if field.help_text %}
                    <p style="font-size:0.8rem; color:#777;">{{ field.help_text }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <div class="acciones" style="margin-top:16px;">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
